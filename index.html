<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Shabbos Dashboard">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">

<title>Shabbos Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%; overflow: hidden;
  background: #000; color: #eee;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-text-size-adjust: 100%;
  user-select: none; -webkit-user-select: none;
}

::-webkit-scrollbar { display: none; }
* { scrollbar-width: none; }

/* === LAYOUT === */
#app {
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  width: 100vw;
  overflow: hidden;
}

/* === SHABBOS BANNER === */
#shabbos-banner {
  width: 100%;
  background: linear-gradient(135deg, rgba(255,213,79,0.1) 0%, rgba(255,183,77,0.05) 50%, rgba(0,0,0,0) 100%);
  border-bottom: 1px solid rgba(255,213,79,0.15);
  padding: 5px 16px;
  display: flex; align-items: center; justify-content: center;
  gap: 20px;
  flex-shrink: 0;
  min-height: 30px;
}
#shabbos-banner .parsha-name {
  color: #FFD54F;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
#shabbos-banner .times-row {
  display: flex; gap: 16px; align-items: center;
  flex-wrap: wrap; justify-content: center;
}
#shabbos-banner .time-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11.5px; color: #bbb;
  white-space: nowrap;
}
#shabbos-banner .time-item .icon { font-size: 12px; }
#shabbos-banner .time-item .candle-icon { color: #FFB74D; }
#shabbos-banner .time-item .moon-icon { color: #90CAF9; }
#shabbos-banner .time-item strong { color: #eee; font-weight: 600; }

/* === TOP BAR === */
#top-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 16px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
  height: 34px;
}
#top-bar .brand {
  font-size: 11px; font-weight: 700;
  color: #4FC3F7;
  letter-spacing: 3px;
  text-transform: uppercase;
}
#top-bar .right-section {
  display: flex; align-items: center; gap: 10px;
}
#top-bar .updated-label {
  font-size: 9px; color: #444; white-space: nowrap;
}
#top-bar .visitors-label {
  font-size: 9px; color: #4a9a6a; white-space: nowrap;
  display: none;
}
#top-bar .visitors-label.show { display: inline; }
#top-bar .clock {
  font-size: 14px; font-weight: 600;
  color: #eee;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.5px;
}
.icon-btn {
  background: none; border: none; color: #555;
  cursor: pointer; padding: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s;
  font-size: 15px;
  line-height: 1;
}
.icon-btn:hover { color: #aaa; }
.icon-btn.active { color: #FFB74D; }

/* === MAIN CONTENT === */
#main-content {
  flex: 1;
  display: flex;
  overflow: hidden;
  min-height: 0;
}

/* === LEFT PANEL — NEWS === */
#news-panel {
  width: 50%;
  display: flex; flex-direction: column;
  border-right: 1px solid #1a1a1a;
  overflow: hidden;
}
.section-header {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 14px;
  border-bottom: 1px solid #111;
  flex-shrink: 0;
}
.section-header .hdr-icon { font-size: 13px; }
.section-header .hdr-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.section-header .hdr-label.cyan { color: #4FC3F7; }
.section-header .hdr-label.amber { color: #FFB74D; }

/* Infinite scroll container — uses clone trick */
.scroll-outer {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-height: 0;
}
.scroll-track {
  /* moves via transform for smooth infinite loop */
  will-change: transform;
}

.news-card {
  padding: 8px 14px;
  border-bottom: 1px solid #111;
}
.news-card .source {
  font-size: 9px; font-weight: 700;
  color: #4FC3F7; letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.news-card .title {
  font-size: 13px; font-weight: 600;
  color: #eee; line-height: 1.35;
  margin-bottom: 3px;
}
.news-card .desc {
  font-size: 11.5px; color: #888;
  line-height: 1.45;
}
/* Source divider between feed sections */
.feed-divider {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px 5px;
  background: #060606;
  border-bottom: 1px solid #111;
}
.feed-divider .feed-icon { font-size: 12px; }
.feed-divider .feed-name {
  font-size: 9px; font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* === RIGHT PANEL === */
#right-panel {
  width: 50%;
  display: flex; flex-direction: column;
  overflow: hidden;
}

/* === WEATHER === */
#weather-section {
  padding: 4px 14px 6px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}
#weather-main {
  display: flex; align-items: center; gap: 10px;
  margin-top: 2px;
}
#weather-main .temp-group {
  display: flex; align-items: flex-start;
}
#weather-main .temp {
  font-size: 30px; font-weight: 300;
  color: #eee;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
#weather-main .temp-unit {
  font-size: 13px; font-weight: 400;
  color: #555;
  margin-top: 2px;
}
#weather-main .weather-icon {
  font-size: 24px;
  line-height: 1;
}
#weather-main .weather-desc {
  flex: 1;
}
#weather-main .weather-desc .condition {
  font-size: 12px; font-weight: 500; color: #ccc;
}
#weather-main .weather-desc .location {
  font-size: 9px; color: #555; margin-top: 1px;
}
#weather-details {
  display: flex; gap: 14px;
  margin-top: 3px;
}
#weather-details .detail {
  font-size: 9px; color: #666;
}
#weather-details .detail span {
  color: #aaa; font-weight: 500;
}
#hourly-forecast {
  display: flex; gap: 0; margin-top: 5px;
  border-top: 1px solid #151515;
  padding-top: 5px;
  overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  padding-bottom: 4px;
}
#hourly-forecast::-webkit-scrollbar { display: none; }
.hour-col {
  flex: 0 0 auto;
  width: 52px;
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
}
.hour-col .hour-time {
  font-size: 10px; color: #666;
  font-weight: 600;
  white-space: nowrap;
}
.hour-col .hour-time.now { color: #4FC3F7; }
.hour-col .hour-icon {
  font-size: 15px; line-height: 1;
}
.hour-col .hour-temp {
  font-size: 12px; font-weight: 600;
  color: #ddd;
  font-variant-numeric: tabular-nums;
}
.hour-col .hour-temp.now { color: #fff; }
.hour-col .hour-precip {
  font-size: 8px; font-weight: 600;
  color: #42A5F5;
  min-height: 10px;
}

/* === SCORES === */
#scores-section {
  flex: 1; display: flex; flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
#scores-scroll {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.score-card {
  background: #080808;
  border: 1px solid #1a1a1a;
  border-radius: 8px;
  margin: 4px 10px;
  overflow: hidden;
}
.score-card .card-top {
  display: flex; align-items: center; justify-content: space-between;
  padding: 3px 10px;
  background: #0c0c0c;
  border-bottom: 1px solid #151515;
}
.score-card .card-top-left {
  display: flex; align-items: center; gap: 6px;
}
.score-card .league-badge {
  font-size: 9px; font-weight: 800;
  letter-spacing: 1px;
  padding: 1px 6px;
  border-radius: 3px;
  text-transform: uppercase;
}
.league-nfl { background: rgba(76,175,80,0.15); color: #4CAF50; }
.league-nba { background: rgba(255,152,0,0.15); color: #FF9800; }
.league-nhl { background: rgba(33,150,243,0.15); color: #2196F3; }
.league-mlb { background: rgba(244,67,54,0.15); color: #F44336; }
.score-card .game-date {
  font-size: 8px; color: #444;
  white-space: nowrap;
}
.score-card .game-status {
  font-size: 9px; color: #666;
  display: flex; align-items: center; gap: 4px;
}
.score-card .live-dot {
  width: 6px; height: 6px;
  background: #F44336;
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}
.score-card .game-status.live { color: #F44336; font-weight: 600; }

.score-card .matchup {
  display: flex; align-items: center;
  padding: 5px 8px;
  gap: 5px;
}
.score-card .team {
  display: flex; align-items: center; gap: 6px;
  flex: 1;
  min-width: 0;
}
.score-card .team.away { justify-content: flex-end; flex-direction: row-reverse; }
.score-card .team.home { justify-content: flex-start; }
.score-card .team-logo {
  width: 40px; height: 40px;
  border-radius: 4px;
  object-fit: contain;
  flex-shrink: 0;
}
.score-card .team-info {
  display: flex; flex-direction: column;
  min-width: 0; max-width: 100%;
}
.score-card .team.away .team-info { align-items: flex-end; }
.score-card .team-name {
  font-size: 12px; font-weight: 600; color: #ccc;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.score-card .team-record {
  font-size: 9px; color: #3a3a3a; font-weight: 500;
  margin-top: 0px;
}
.score-card .team-score {
  font-size: 28px; font-weight: 800;
  color: #eee;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}
.score-card .team.loser .team-name { color: #333; }
.score-card .team.loser .team-score { color: #333; }
.score-card .team.loser .team-record { color: #282828; }
.score-card .vs-divider {
  font-size: 10px; font-weight: 700;
  color: #1e1e1e;
  flex-shrink: 0;
  padding: 0 2px;
}

/* === PORTRAIT / NARROW SCREEN === */
@media (max-width: 600px) {
  #main-content { flex-direction: column; }
  #news-panel { width: 100%; height: 50%; border-right: none; border-bottom: 1px solid #1a1a1a; }
  #right-panel { width: 100%; height: 50%; }
}
@media (max-width: 480px), (orientation: portrait) {
  .score-card .team-logo { width: 28px; height: 28px; }
  .score-card .team-name { font-size: 10px; }
  .score-card .team-score { font-size: 20px; }
  .score-card .matchup { padding: 4px 6px; gap: 3px; }
  .score-card .team { gap: 4px; }
  .score-card .card-top { padding: 3px 8px; }
  .score-card .league-badge { font-size: 8px; padding: 1px 5px; }
  .score-card .game-status { font-size: 8px; }
  .score-card { margin: 3px 8px; }
  #weather-main .temp { font-size: 26px; }
  #weather-main .weather-icon { font-size: 20px; }
  .hour-col { width: 44px; }
  .hour-col .hour-icon { font-size: 13px; }
  .hour-col .hour-temp { font-size: 11px; }
}

/* === SETTINGS MODAL === */
#settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  display: none; align-items: center; justify-content: center;
  z-index: 1000;
  overflow-y: auto;
  padding: 20px;
}
#settings-overlay.open { display: flex; }
#settings-dialog {
  background: #111; border: 1px solid #222;
  border-radius: 12px;
  padding: 20px;
  width: 320px;
  max-width: 100%;
}
#settings-dialog h2 {
  font-size: 14px; font-weight: 700;
  color: #4FC3F7; letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 16px;
  text-align: center;
}
#settings-dialog .field-label {
  font-size: 10px; color: #888;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
#settings-dialog .current-zip {
  font-size: 10px; color: #444;
  margin-bottom: 10px;
}
#zip-input {
  background: #080808; border: 1px solid #2a2a2a;
  border-radius: 8px;
  color: #eee; font-size: 22px; font-weight: 600;
  letter-spacing: 6px;
  text-align: center;
  padding: 10px 16px;
  width: 100%;
  outline: none;
  font-family: 'Inter', sans-serif;
}
#zip-input:focus { border-color: #4FC3F7; }
#zip-input::placeholder { color: #2a2a2a; }
.settings-btns {
  display: flex; gap: 8px; margin-top: 14px;
}
.settings-btns button {
  flex: 1; padding: 10px;
  border-radius: 8px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: none;
  transition: background 0.2s;
  font-family: 'Inter', sans-serif;
}
#save-zip-btn { background: #4FC3F7; color: #000; }
#save-zip-btn:hover { background: #81D4FA; }
#cancel-zip-btn { background: #1a1a1a; color: #777; }
#cancel-zip-btn:hover { background: #222; }

/* News source checkboxes */
.settings-section-title {
  font-size: 10px; color: #555; text-transform: uppercase;
  letter-spacing: 1px; margin: 14px 0 8px;
  border-top: 1px solid #1a1a1a;
  padding-top: 12px;
}
.news-toggle-list {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.news-toggle {
  display: flex; align-items: center; gap: 6px;
  background: #0a0a0a; border: 1px solid #1e1e1e;
  border-radius: 6px; padding: 6px 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.news-toggle.on { border-color: #2a4a2a; }
.news-toggle .nt-icon { font-size: 13px; flex-shrink: 0; }
.news-toggle .nt-name {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1px; color: #555;
  text-transform: uppercase;
  white-space: nowrap;
}
.news-toggle.on .nt-name { color: #88cc88; }
.news-toggle .nt-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #222; margin-left: auto; flex-shrink: 0;
}
.news-toggle.on .nt-dot { background: #4CAF50; }

/* === TOUCH LOCK === */
#lock-overlay {
  position: fixed; inset: 0;
  z-index: 900;
  display: none;
  background: transparent;
}
#lock-overlay.active { display: block; }
#lock-indicator {
  position: fixed;
  top: 8px; right: 8px;
  font-size: 10px; color: rgba(255,255,255,0.15);
  z-index: 950;
  display: none;
  pointer-events: none;
  letter-spacing: 0.3px;
}
#lock-overlay.active ~ #lock-indicator { display: block; }
#unlock-zone {
  position: absolute;
  top: 0; right: 0;
  width: 70px; height: 70px;
  z-index: 910;
}

/* === SKELETON LOADERS === */
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.skeleton {
  background: linear-gradient(90deg, #0a0a0a 25%, #151515 50%, #0a0a0a 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: 4px;
}
.skel-line { height: 12px; margin-bottom: 8px; }
.skel-line.w80 { width: 80%; }
.skel-line.w60 { width: 60%; }
.skel-line.w40 { width: 40%; }
.skel-line.tall { height: 16px; margin-bottom: 10px; }
.skel-block { height: 72px; border-radius: 8px; margin: 4px 10px; }

/* === EMPTY / NO DATA === */
.no-data {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center;
  text-align: center; padding: 32px 16px;
  color: #333; font-size: 11px;
}
.no-data .nd-icon {
  font-size: 28px; margin-bottom: 8px; opacity: 0.4;
}
</style>
</head>
<body>

<div id="app">
  <!-- Shabbos Banner -->
  <div id="shabbos-banner">
    <span class="parsha-name" id="parsha-label">Loading…</span>
    <div class="times-row" id="times-row"></div>
  </div>

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="brand">SHABBOS DASHBOARD</div>
    <div class="right-section">
      <span class="visitors-label" id="visitors-label"></span>
      <span class="updated-label" id="updated-label"></span>
      <span class="clock" id="clock"></span>
      <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">⚙</button>
      <button class="icon-btn" id="lock-btn" title="Lock Screen" aria-label="Lock Screen">🔓</button>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <!-- Left: News -->
    <div id="news-panel">
      <div class="section-header">
        <span class="hdr-icon">📰</span>
        <span class="hdr-label cyan">NEWS</span>
      </div>
      <div class="scroll-outer" id="news-outer">
        <div class="scroll-track" id="news-track">
          <div style="padding:8px 0">
            <div class="skeleton skel-line tall w80" style="margin:0 14px 8px"></div>
            <div class="skeleton skel-line w60" style="margin:0 14px 8px"></div>
            <div class="skeleton skel-line" style="margin:0 14px 8px"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Weather + Scores -->
    <div id="right-panel">
      <div id="weather-section">
        <div class="section-header" style="padding-left:0; border-bottom:none; padding-bottom:0; padding-top:3px; padding-bottom:2px;">
          <span class="hdr-icon" style="font-size:11px">🌡</span>
          <span class="hdr-label cyan">WEATHER</span>
        </div>
        <div id="weather-main">
          <div class="temp-group">
            <span class="temp" id="weather-temp">--</span>
            <span class="temp-unit">°F</span>
          </div>
          <span class="weather-icon" id="weather-icon">⛅</span>
          <div class="weather-desc">
            <div class="condition" id="weather-condition">Loading…</div>
            <div class="location" id="weather-location">--</div>
          </div>
        </div>
        <div id="weather-details">
          <div class="detail">Feels Like <span id="weather-feels">--</span>°</div>
          <div class="detail">High <span id="weather-high">--</span>° / Low <span id="weather-low">--</span>°</div>
          <div class="detail">Humidity <span id="weather-humidity">--</span>%</div>
        </div>
        <div id="hourly-forecast"></div>
      </div>

      <div id="scores-section">
        <div class="section-header">
          <span class="hdr-icon">🏆</span>
          <span class="hdr-label amber">SCORES</span>
        </div>
        <div class="scroll-outer" id="scores-outer">
          <div class="scroll-track" id="scores-track">
            <div class="skeleton skel-block"></div>
            <div class="skeleton skel-block"></div>
            <div class="skeleton skel-block"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Settings Overlay -->
<div id="settings-overlay">
  <div id="settings-dialog">
    <h2>⚙ Settings</h2>
    <div class="field-label">ZIP Code</div>
    <div class="current-zip" id="current-zip-label">Current: 10952</div>
    <input type="text" id="zip-input" maxlength="5" placeholder="10952" inputmode="numeric" pattern="[0-9]*">
    <div class="settings-section-title">News Sources</div>
    <div class="news-toggle-list" id="news-toggle-list"></div>
    <div class="settings-btns">
      <button id="cancel-zip-btn">Cancel</button>
      <button id="save-zip-btn">Save</button>
    </div>
  </div>
</div>

<!-- Touch Lock Overlay -->
<div id="lock-overlay">
  <div id="unlock-zone"></div>
</div>
<div id="lock-indicator">🔒 Hold here to unlock</div>

<script>
(function() {
  'use strict';

  // ============ CONFIG ============
  // RSS Proxy — set this to your Cloudflare Worker URL after deploying
  // e.g. 'https://shabbos-rss-proxy.YOUR-NAME.workers.dev'
  // Leave as '' to use rss2json.com directly (fine for low traffic)
  const RSS_PROXY_URL = '';

  const DEFAULT_ZIP = '10952';
  const DEFAULT_LAT = 41.11;

  // ============ HASH — stores zip + enabled feeds ============
  function readHash() {
    const h = location.hash.slice(1);
    const params = new URLSearchParams(h.replace(/^zip=\d{5}/, m => 'zip=' + m.slice(4)));
    // support both old format #zip=XXXXX and new URLSearchParams
    const zipMatch = location.hash.match(/zip=(\d{5})/);
    if (zipMatch) currentZip = zipMatch[1];
    applyZip(currentZip);

    // Restore feed prefs from hash
    const feedParam = h.match(/feeds=([^&]+)/);
    if (feedParam) {
      const ids = feedParam[1].split(',');
      enabledFeeds = new Set(ids);
    }
  }

  function saveHash() {
    const feedStr = [...enabledFeeds].join(',');
    location.hash = 'zip=' + currentZip + '&feeds=' + feedStr;
  }

  function applyZip(zip) {
    currentZip = zip;
    const c = ZIP_COORDS[zip];
    if (c) {
      currentLat = c.lat;
      currentLon = c.lon;
      locationName = c.name;
    } else {
      currentLat = DEFAULT_LAT;
      currentLon = DEFAULT_LON;
      locationName = 'ZIP ' + zip;
    }
    currentZipLabel.textContent = 'Current: ' + zip;
  }

  // ============ CLOCK ============
  function updateClock() {
    const d = new Date();
    let h = d.getHours();
    const mn = String(d.getMinutes()).padStart(2, '0');
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    clockEl.textContent = h + ':' + mn + ' ' + ap;
  }

  function stampUpdate() {
    const d = new Date();
    let h = d.getHours();
    const mn = String(d.getMinutes()).padStart(2, '0');
    const ap = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    updatedEl.textContent = 'Updated ' + h + ':' + mn + ' ' + ap;
  }

  // ============ VISITOR COUNT (hits.sh badge — auto-increments on page load) ============
  function fetchVisitorCount() {
    // hits.sh: embed as invisible img to register the hit, then read SVG text
    const img = new Image();
    const badgeUrl = 'https://hits.sh/reifere-stack.github.io/shabbos-dashboard.svg';
    img.onload = () => {
      // Fetch SVG text to extract the count
      fetch(badgeUrl)
        .then(r => r.text())
        .then(svg => {
          const m = svg.match(/>([\d,]+)<\/text>/g);
          if (m && m.length >= 2) {
            // Last number in SVG is the count
            const last = m[m.length - 1].replace(/<[^>]+>/g, '');
            if (last && parseInt(last) > 0) {
              visitorsEl.textContent = '👁 ' + parseInt(last).toLocaleString() + ' views';
              visitorsEl.classList.add('show');
            }
          }
        })
        .catch(() => {});
    };
    img.src = badgeUrl + '?t=' + Date.now();
  }

  // ============ SHABBOS ============
  async function fetchShabbos() {
    try {
      const r = await fetch('https://www.hebcal.com/shabbat?cfg=json&zip=' + currentZip + '&m=50');
      const d = await r.json();
      renderShabbos(d);
    } catch {
      parshaEl.textContent = 'Lekavod Shabbos';
      timesRow.innerHTML = '';
    }
  }

  function renderShabbos(data) {
    const items = data.items || [];
    let parashat = '', holiday = '', candles = [], havdalah = '';

    for (const it of items) {
      if (it.category === 'parashat') parashat = it.title || '';
      if (it.category === 'holiday' && it.yomtov === true && !holiday) holiday = it.title || '';
      if (it.category === 'candles') {
        const time = fmt12(new Date(it.date));
        const label = it.memo || 'Erev Shabbos';
        candles.push({ time, label });
      }
      if (it.category === 'havdalah') havdalah = fmt12(new Date(it.date));
    }

    if (holiday) {
      const cleanHoliday = holiday.replace(/\s+(I|II|III|IV|V|VI|VII)$/, '').replace(/\s*\(CH.*\)$/i, '');
      if (parashat) {
        parshaEl.textContent = 'Lekavod Shabbos ' + parashat.replace('Parashat ', 'Parshas ') + ' / ' + cleanHoliday;
      } else {
        parshaEl.textContent = 'Lekavod ' + cleanHoliday;
      }
    } else if (parashat) {
      parshaEl.textContent = 'Lekavod Shabbos ' + parashat.replace('Parashat ', 'Parshas ');
    } else {
      parshaEl.textContent = 'Lekavod Shabbos';
    }

    let h = '';
    const multiDay = candles.length > 1;
    for (const c of candles) {
      const dayLabel = multiDay ? esc(c.label) + ' ' : 'Hadlakas Neiros ';
      h += '<div class="time-item"><span class="icon candle-icon">🕯</span> ' + dayLabel + '<strong>' + c.time + '</strong></div>';
    }
    if (havdalah) {
      h += '<div class="time-item"><span class="icon moon-icon">🌙</span> Havdalah <strong>' + havdalah + '</strong></div>';
    }
    timesRow.innerHTML = h;
  }

  function fmt12(d) {
    let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const ap = h >= 12 ? 'PM' : 'AM';
    return (h % 12 || 12) + ':' + m + ' ' + ap;
  }

  // ============ NEWS — fetch all enabled feeds simultaneously ============
  async function fetchAllNews() {
    const active = ALL_FEEDS.filter(f => enabledFeeds.has(f.id));
    if (!active.length) {
      setNewsContent('<div class="no-data"><div class="nd-icon">📰</div>No news sources selected</div>');
      return;
    }

    const results = await Promise.allSettled(
      active.map(feed => {
        const apiUrl = RSS_PROXY_URL
          ? RSS_PROXY_URL + '/rss?url=' + encodeURIComponent(feed.url)
          : 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feed.url);
        return fetch(apiUrl).then(r => r.json()).then(d => ({ feed, d }));
      })
    );

    let html = '';
    for (const res of results) {
      if (res.status !== 'fulfilled') continue;
      const { feed, d } = res.value;
      if (d.status !== 'ok' || !d.items || !d.items.length) continue;

      // Feed divider header
      html += '<div class="feed-divider">' +
        '<span class="feed-icon">' + feed.icon + '</span>' +
        '<span class="feed-name" style="color:' + feedColor(feed.id) + '">' + esc(feed.name) + '</span>' +
        '</div>';

      for (const it of d.items) {
        let source, headline;
        if (feed.google) {
          const parsed = splitNewsTitle(it.title || '');
          source = parsed.source;
          headline = parsed.headline;
        } else {
          source = it.author || (d.feed && d.feed.title) || feed.name;
          headline = it.title || '';
        }
        const desc = stripTags(it.description || '');
        html += '<div class="news-card">' +
          '<div class="source">' + esc(source) + '</div>' +
          '<div class="title">' + esc(headline) + '</div>' +
          (desc ? '<div class="desc">' + esc(desc) + '</div>' : '') +
          '</div>';
      }
    }

    if (!html) {
      setNewsContent('<div class="no-data"><div class="nd-icon">📰</div>News unavailable right now</div>');
      return;
    }

    setNewsContent(html);
  }

  function feedColor(id) {
    const colors = {
      gnews: '#4FC3F7', gtech: '#81D4FA', gsci: '#4DB6AC',
      wired: '#FFB74D', tc: '#FF8A65', scidaily: '#A5D6A7',
      ywn: '#CE93D8', vin: '#F48FB1', npr: '#80CBC4', bbc: '#90CAF9'
    };
    return colors[id] || '#888';
  }

  function setNewsContent(html) {
    newsTrack.innerHTML = html;
    // For infinite scroll: duplicate content
    newsContentH = newsTrack.scrollHeight;
    if (newsContentH > newsOuter.clientHeight) {
      // Clone for seamless loop
      newsTrack.innerHTML += html;
    }
    newsPos = 0;
    newsTrack.style.transform = 'translateY(0)';
    newsContentH = newsTrack.scrollHeight / 2; // half = one set
  }

  function splitNewsTitle(t) {
    const i = t.lastIndexOf(' - ');
    if (i > 0) return { headline: t.substring(0, i).trim(), source: t.substring(i + 3).trim() };
    return { headline: t, source: '' };
  }

  function stripTags(s) {
    const el = document.createElement('div');
    el.innerHTML = s;
    let text = (el.textContent || '').trim();
    text = text.replace(/\s{2,}/g, ' ');
    if (text.length > 400) text = text.substring(0, 400).replace(/\s+\S*$/, '') + '…';
    return text;
  }

  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ============ WEATHER ============

  async function fetchWeather() {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + currentLat +
        '&longitude=' + currentLon +
        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code' +
        '&hourly=temperature_2m,weather_code,precipitation_probability' +
        '&daily=temperature_2m_max,temperature_2m_min,weather_code' +
        '&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=2&timezone=America/New_York';
      const r = await fetch(url);
      const d = await r.json();
      renderWeather(d);
    } catch {
      $('weather-condition').textContent = 'Unavailable';
    }

  function renderWeather(d) {
    const c = d.current || {};
    const dy = d.daily || {};
    const code = c.weather_code ?? 0;
    const w = WX[code] || ['Unknown', '🌡'];

    $('weather-temp').textContent = Math.round(c.temperature_2m || 0);
    $('weather-icon').textContent = w[1];
    $('weather-condition').textContent = w[0];
    $('weather-location').textContent = locationName;
    $('weather-feels').textContent = Math.round(c.apparent_temperature || 0);
    $('weather-high').textContent = Math.round((dy.temperature_2m_max || [0])[0]);
    $('weather-low').textContent = Math.round((dy.temperature_2m_min || [0])[0]);
    $('weather-humidity').textContent = Math.round(c.relative_humidity_2m || 0);

    // Hourly
    const hourly = d.hourly || {};
    const times = hourly.time || [];
    const temps = hourly.temperature_2m || [];
    const codes = hourly.weather_code || [];
    const precip = hourly.precipitation_probability || [];
    const now = new Date();
    const nowStr = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + 'T' +
      String(now.getHours()).padStart(2,'0') + ':00';
    let startIdx = times.indexOf(nowStr);
    if (startIdx < 0) startIdx = 0;

    let h = '';
    for (let i = startIdx; i < Math.min(startIdx + 24, times.length); i++) {
      const dt = new Date(times[i] + ':00');
      const hr = dt.getHours();
      const isNow = (i === startIdx);
      const label = isNow ? 'Now' : (hr === 0 ? '12AM' : hr < 12 ? hr + 'AM' : hr === 12 ? '12PM' : (hr-12) + 'PM');
      const wx = WX[codes[i]] || ['', '🌡'];
      const pct = precip[i] || 0;
      h += '<div class="hour-col">' +
        '<span class="hour-time' + (isNow ? ' now' : '') + '">' + label + '</span>' +
        '<span class="hour-icon">' + wx[1] + '</span>' +
        '<span class="hour-temp' + (isNow ? ' now' : '') + '">' + Math.round(temps[i]) + '°</span>' +
        '<span class="hour-precip">' + (pct >= 10 ? '💧' + pct + '%' : '') + '</span>' +
        '</div>';
    }
    $('hourly-forecast').innerHTML = h;
    hourlyPos = 0;
    $('hourly-forecast').scrollLeft = 0;
  }

  // ============ SCORES ============
  const LEAGUES = [
    { key: 'nfl', url: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard', name: 'NFL', cls: 'league-nfl' },
    { key: 'nba', url: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard', name: 'NBA', cls: 'league-nba' },
    { key: 'nhl', url: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard', name: 'NHL', cls: 'league-nhl' },

  ];

  async function fetchScores() {
    const games = [];
    const results = await Promise.allSettled(
      LEAGUES.map(l => fetch(l.url).then(r => r.json()).then(d => ({ league: l, data: d })))
    );
    for (const r of results) {
      if (r.status !== 'fulfilled') continue;
      const { league, data } = r.value;
      for (const ev of (data.events || [])) {
        const comp = (ev.competitions || [])[0];
        if (!comp) continue;
        const st = comp.status || {};
        const stype = st.type || {};
        const gameDate = comp.date ? new Date(comp.date) : null;
        let away = null, home = null;
        for (const c of (comp.competitors || [])) {
          const t = c.team || {};
          const records = c.records || [];
          // Overall record is usually first
          const overallRecord = records.find(r => r.type === 'total' || r.name === 'overall') || records[0];
          const entry = {
            abbr: t.abbreviation || '???',
            name: t.shortDisplayName || t.displayName || '???',
            logo: t.logo || '',
            score: c.score || '0',
            winner: c.winner || false,
            record: overallRecord ? overallRecord.summary : '',
          };
          if (c.homeAway === 'away') away = entry; else home = entry;
        }
        if (away && home) {
          games.push({ league, away, home, state: stype.state || 'pre', detail: stype.shortDetail || '', gameDate });
        }
      }
    }
    renderScores(games);
  }

  function formatGameDate(d) {
    if (!d) return '';
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const gameDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const diff = (gameDay - today) / 86400000;
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const timeStr = fmt12(d);
    if (diff === 0) return 'Today · ' + timeStr;
    if (diff === 1) return 'Tomorrow · ' + timeStr;
    if (diff === -1) return 'Yesterday · ' + timeStr;
    if (diff < -1) return fmtShortDate(d);
    return days[d.getDay()] + ' · ' + timeStr;
  }

  function fmtShortDate(d) {
    if (!d) return '';
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[d.getMonth()] + ' ' + d.getDate();
  }

  function renderScores(games) {
    if (!games.length) {
      setScoresContent('<div class="no-data"><div class="nd-icon">🏟</div>No games today</div>');
      return;
    }

    const ord = { 'in': 0, 'post': 1, 'pre': 2 };
    games.sort((a, b) => (ord[a.state] ?? 2) - (ord[b.state] ?? 2));

    let h = '';
    for (const g of games) {
      const live = g.state === 'in';
      const post = g.state === 'post';
      const pre = g.state === 'pre';
      const awCls = post && g.home.winner ? ' loser' : '';
      const hmCls = post && g.away.winner ? ' loser' : '';
      // Show date for upcoming games, and for finals show when game was played
      const dateStr = pre ? formatGameDate(g.gameDate) : (post && g.gameDate ? fmtShortDate(g.gameDate) : '');

      h += '<div class="score-card">' +
        '<div class="card-top">' +
          '<div class="card-top-left">' +
            '<span class="league-badge ' + g.league.cls + '">' + g.league.name + '</span>' +
            (dateStr ? '<span class="game-date">' + esc(dateStr) + '</span>' : '') +
          '</div>' +
          '<span class="game-status' + (live ? ' live' : '') + '">' +
            (live ? '<span class="live-dot"></span>' : '') +
            esc(g.detail) +
          '</span>' +
        '</div>' +
        '<div class="matchup">' +
          '<div class="team away' + awCls + '">' +
            '<img class="team-logo" src="' + esc(g.away.logo) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' +
            '<div class="team-info">' +
              '<span class="team-name">' + esc(g.away.name) + '</span>' +
              (g.away.record ? '<span class="team-record">' + esc(g.away.record) + '</span>' : '') +
              '<span class="team-score">' + esc(g.away.score) + '</span>' +
            '</div>' +
          '</div>' +
          '<span class="vs-divider">VS</span>' +
          '<div class="team home' + hmCls + '">' +
            '<img class="team-logo" src="' + esc(g.home.logo) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' +
            '<div class="team-info">' +
              '<span class="team-name">' + esc(g.home.name) + '</span>' +
              (g.home.record ? '<span class="team-record">' + esc(g.home.record) + '</span>' : '') +
              '<span class="team-score">' + esc(g.home.score) + '</span>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    }
    setScoresContent(h);
  }

  function setScoresContent(html) {
    scoresTrack.innerHTML = html;
    scoresContentH = scoresTrack.scrollHeight;
    if (scoresContentH > scoresOuter.clientHeight) {
      scoresTrack.innerHTML += html;
    }
    scoresPos = 0;
    scoresTrack.style.transform = 'translateY(0)';
    scoresContentH = scoresTrack.scrollHeight / 2;
  }

  // ============ INFINITE AUTO-SCROLL (transform-based, no jump) ============
  function startScroll() {
    // News infinite scroll
    setInterval(() => {
      if (!newsContentH || newsContentH <= newsOuter.clientHeight) return;
      newsPos += SCROLL_SPEED;
      if (newsPos >= newsContentH) newsPos -= newsContentH;
      newsTrack.style.transform = 'translateY(-' + newsPos + 'px)';
    }, SCROLL_TICK);

    // Scores infinite scroll
    setInterval(() => {
      if (!scoresContentH || scoresContentH <= scoresOuter.clientHeight) return;
      scoresPos += SCROLL_SPEED;
      if (scoresPos >= scoresContentH) scoresPos -= scoresContentH;
      scoresTrack.style.transform = 'translateY(-' + scoresPos + 'px)';
    }, SCROLL_TICK);

    // Hourly horizontal auto-scroll (bounce-back is fine here per user — keep pause/reset)
    const hourlyEl = $('hourly-forecast');
    setInterval(() => {
      if (hourlyPaused) return;
      const max = hourlyEl.scrollWidth - hourlyEl.clientWidth;
      if (max <= 0) return;
      hourlyPos += SCROLL_SPEED * 0.5;
      if (hourlyPos >= max) {
        hourlyPaused = true;
        setTimeout(() => { hourlyPos = 0; hourlyEl.scrollLeft = 0; hourlyPaused = false; }, 3000);
      }
      hourlyEl.scrollLeft = hourlyPos;
    }, SCROLL_TICK);
  }

  // ============ SETTINGS ============
  function buildNewsToggles() {
    const list = $('news-toggle-list');
    list.innerHTML = '';
    for (const feed of ALL_FEEDS) {
      const on = enabledFeeds.has(feed.id);
      const div = document.createElement('div');
      div.className = 'news-toggle' + (on ? ' on' : '');
      div.dataset.id = feed.id;
      div.innerHTML =
        '<span class="nt-icon">' + feed.icon + '</span>' +
        '<span class="nt-name">' + esc(feed.name) + '</span>' +
        '<span class="nt-dot"></span>';
      div.addEventListener('click', () => {
        if (enabledFeeds.has(feed.id)) {
          if (enabledFeeds.size <= 1) return; // keep at least one
          enabledFeeds.delete(feed.id);
          div.classList.remove('on');
        } else {
          enabledFeeds.add(feed.id);
          div.classList.add('on');
        }
      });
      list.appendChild(div);
    }
  }

  function setupSettings() {
    $('settings-btn').addEventListener('click', () => {
      if (isLocked) return;
      zipInput.value = currentZip;
      buildNewsToggles();
      settingsOverlay.classList.add('open');
      setTimeout(() => zipInput.focus(), 100);
    });
    $('cancel-zip-btn').addEventListener('click', closeSettings);
    $('save-zip-btn').addEventListener('click', saveSettings);
    zipInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveSettings();
      if (e.key === 'Escape') closeSettings();
    });
    zipInput.addEventListener('input', () => {
      zipInput.value = zipInput.value.replace(/\D/g, '').slice(0, 5);
    });
    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) closeSettings();
    });
  }

  function closeSettings() { settingsOverlay.classList.remove('open'); }

  function saveSettings() {
    const v = zipInput.value.trim();
    if (/^\d{5}$/.test(v)) {
      applyZip(v);
      saveHash();
      closeSettings();
      fetchShabbos();
      fetchWeather();
      fetchAllNews();
    } else {
      zipInput.style.borderColor = '#F44336';
      setTimeout(() => { zipInput.style.borderColor = '#2a2a2a'; }, 1200);
    }
  }

  // ============ TOUCH LOCK ============
  function setupLock() {
    lockBtn.addEventListener('click', () => {
      if (isLocked) return;
      isLocked = true;
      lockOverlay.classList.add('active');
      lockBtn.classList.add('active');
      lockBtn.textContent = '🔒';
    });

    lockOverlay.addEventListener('touchstart', (e) => {
      if (e.target !== unlockZone) { e.preventDefault(); e.stopPropagation(); }
    }, { passive: false });
    lockOverlay.addEventListener('click', (e) => {
      if (e.target !== unlockZone) { e.preventDefault(); e.stopPropagation(); }
    });

    function startPress() { lockTimer = setTimeout(unlock, 800); }
    function cancelPress() { clearTimeout(lockTimer); }

    unlockZone.addEventListener('touchstart', startPress, { passive: true });
    unlockZone.addEventListener('mousedown', startPress);
    unlockZone.addEventListener('touchend', cancelPress);
    unlockZone.addEventListener('touchcancel', cancelPress);
    unlockZone.addEventListener('mouseup', cancelPress);
    unlockZone.addEventListener('mouseleave', cancelPress);
  }

  function unlock() {
    isLocked = false;
    lockOverlay.classList.remove('active');
    lockBtn.classList.remove('active');
    lockBtn.textContent = '🔓';
  }

  // ============ WAKE LOCK ============
  async function acquireWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => setTimeout(acquireWakeLock, 1000));
      }
    } catch { /* silent */ }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') acquireWakeLock();
  });

  // ============ GO ============
  init();
})();
</script>
</body>
</html>
